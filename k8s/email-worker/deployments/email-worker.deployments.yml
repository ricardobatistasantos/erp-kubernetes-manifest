apiVersion: apps/v1
kind: Deployment
metadata:
  name: mail-worker
  namespace: mail-worker
  labels:
    app: mail-worker
    app.kubernetes.io/name: mail-worker
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mail-worker
  template:
    metadata:
      labels:
        app: mail-worker
        app.kubernetes.io/name: mail-worker
    spec:
      serviceAccountName: mail-worker-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: mail-worker
          image: erp-modular/mail-worker:1.0.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: mail-worker-config
            - secretRef:
                name: mail-worker-secret
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 3001
          startupProbe:
            httpGet:
              path: /health
              port: 3001
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: mail-worker
  namespace: mail-worker
  labels:
    app: mail-worker
    app.kubernetes.io/name: mail-worker
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "3001"
spec:
  type: ClusterIP
  selector:
    app: mail-worker
  ports:
    - name: http
      port: 3001
      targetPort: 3001