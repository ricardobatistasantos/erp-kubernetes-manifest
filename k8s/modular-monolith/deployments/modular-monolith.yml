apiVersion: apps/v1
kind: Deployment
metadata:
  name: modular-monolith
  namespace: modular-monolith
  labels:
    app: modular-monolith
    app.kubernetes.io/name: modular-monolith
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: modular-monolith
  template:
    metadata:
      labels:
        app: modular-monolith
        app.kubernetes.io/name: modular-monolith
    spec:
      serviceAccountName: modular-monolith-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: modular-monolith
          image: modular-monolith:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: modular-monolith-config
            - secretRef:
                name: modular-monolith-secrets
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          startupProbe:
            httpGet:
              path: /
              port: 3000
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: modular-monolith
  namespace: modular-monolith
  labels:
    app: modular-monolith
    app.kubernetes.io/name: modular-monolith
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "3000"
spec:
  type: ClusterIP
  selector:
    app: modular-monolith
  ports:
    - name: http
      port: 3000
      targetPort: 3000