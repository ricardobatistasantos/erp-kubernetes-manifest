# Este secret unifica os dados sensíveis que o deployment consome via envFrom.secretRef
# Valores separados nos secrets individuais (postgres-secrets, mongo-secrets, rabbitmq-secret)
# são mantidos para referência. Este é consumido diretamente pelo deployment.
#
# echo -n 'admin' | base64          → YWRtaW4=
# echo -n 'admin123' | base64      → YWRtaW4xMjM=
# echo -n 'erp_db' | base64        → ZXJwX2Ri

apiVersion: v1
kind: Secret
metadata:
  name: modular-monolith-secrets
  namespace: modular-monolith
  labels:
    app.kubernetes.io/name: modular-monolith
type: Opaque
data:
  # Postgres
  POSTGRES_USER: YWRtaW4=
  POSTGRES_PASSWORD: YWRtaW4xMjM=
  POSTGRES_DB: ZXJwX2Ri
  # RabbitMQ
  RABBITMQ_DEFAULT_USER: dXNlcg==
  RABBITMQ_DEFAULT_PASS: cGFzc3dvcmQ=
  AMQP_URL: YW1xcDovL3VzZXI6cGFzc3dvcmRAaG9zdC5taW5pa3ViZS5pbnRlcm5hbDo1Njcy
  # MongoDB
  MONGO_URL: bW9uZ29kYjovL2FkbWluOmFkbWluMTIzQGhvc3QubWluaWt1YmUuaW50ZXJuYWw6MjcwMTcvZXJwP2F1dGhTb3VyY2U9YWRtaW4=
